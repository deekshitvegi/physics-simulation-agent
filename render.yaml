# Render Blueprint — deploys the FastAPI backend for free.
# How to use:
#   1. Go to https://render.com → New → Blueprint → connect this repo.
#   2. Render reads this file and creates the service.
#   3. In the service's Environment tab, set GROQ_API_KEY (get one free at
#      https://console.groq.com/keys).
# Note: the free plan sleeps after ~15 min of inactivity (first request is slow).
services:
  - type: web
    name: physics-tutor-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
