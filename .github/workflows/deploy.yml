name: Deploy

on:
  push:
    branches: [main]

# Frontend deploy to Vercel. Configure these repository secrets first:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# The job is skipped automatically if VERCEL_TOKEN is not set.
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for Vercel token
        id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN not set — skipping deploy."
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.enabled == 'true'
        with:
          node-version: "20"
      - name: Install Vercel CLI
        if: steps.check.outputs.enabled == 'true'
        run: npm install -g vercel
      - name: Deploy to Vercel
        if: steps.check.outputs.enabled == 'true'
        working-directory: frontend
        run: vercel --prod --yes --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
